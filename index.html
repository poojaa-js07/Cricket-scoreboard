<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Cricket Scoreboard</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>🏏 Professional Cricket Scoreboard</h1>

        <div class="match-info">

            <select id="teamA">
                <option>India</option>
                <option>Australia</option>
                <option>England</option>
                <option>Pakistan</option>
                <option>South Africa</option>
                <option>New Zealand</option>
                <option>RCB</option>
                <option>CSK</option>
                <option>MI</option>
                <option>KKR</option>
                <option>SRH</option>
            </select>

            <span class="vs">VS</span>

            <select id="teamB">
                <option>Australia</option>
                <option>India</option>
                <option>England</option>
                <option>Pakistan</option>
                <option>South Africa</option>
                <option>New Zealand</option>
                <option>RCB</option>
                <option>CSK</option>
                <option>MI</option>
                <option>KKR</option>
                <option>SRH</option>
            </select>

        </div>

        <div class="scoreboard">

            <h2 id="battingTeam">
                Batting : India
            </h2>

            <h3 id="score">
                0 / 0
            </h3>

            <p id="overs">
                Overs : 0.0
            </p>

            <p id="runRate">
                Current Run Rate : 0.00
            </p>

            <p id="target">
                Target : --
            </p>

            <p id="lastBall">
                Last Ball : --
            </p>

            <h3 id="winner">
                Winner : --
            </h3>

        </div>

        <div class="buttons">

            <button id="one">+1</button>

            <button id="two">+2</button>

            <button id="three">+3</button>

            <button id="four">FOUR</button>

            <button id="six">SIX</button>

            <button id="dot">DOT</button>

            <button id="wide">WIDE</button>

            <button id="noBall">NO BALL</button>

            <button id="wicket">WICKET</button>

            <button id="innings">SWITCH INNINGS</button>

            <button id="reset">RESET MATCH</button>

        </div>
        <footer>
    <p>Designed & Developed by <strong>POOJAA S</strong></p>
</footer>

    </div>

    <script src="script.js"></script>
    
</body>

</html>
